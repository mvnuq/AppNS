<mat-card class="card">
  <mat-card-header>
    <mat-card-title>Usuarios</mat-card-title>
    <mat-card-subtitle>Gestión de cuentas y roles</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="toolbar">
      <a mat-flat-button color="primary" routerLink="/users/new">
        <mat-icon>person_add</mat-icon>
        Nuevo usuario
      </a>
    </div>

    @if (users$ | async; as users) {
      <div class="table-wrap">
        <table mat-table [dataSource]="users" class="mat-elevation-z0">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let row">{{ row.id }}</td>
          </ng-container>

          <ng-container matColumnDef="fullName">
            <th mat-header-cell *matHeaderCellDef>Nombre completo</th>
            <td mat-cell *matCellDef="let row">{{ row.fullName }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Correo</th>
            <td mat-cell *matCellDef="let row">{{ row.email }}</td>
          </ng-container>

          <ng-container matColumnDef="roleName">
            <th mat-header-cell *matHeaderCellDef>Rol</th>
            <td mat-cell *matCellDef="let row">{{ row.roleName }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-col">Acciones</th>
            <td mat-cell *matCellDef="let row" class="actions-col">
              <button
                mat-icon-button
                type="button"
                color="primary"
                matTooltip="Editar"
                (click)="edit(row)"
              >
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                type="button"
                color="warn"
                matTooltip="Eliminar"
                (click)="confirmDelete(row)"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackByUserId"></tr>
        </table>

        @if (users.length === 0) {
          <p class="empty">No hay usuarios registrados.</p>
        }
      </div>
    }
  </mat-card-content>
</mat-card>
