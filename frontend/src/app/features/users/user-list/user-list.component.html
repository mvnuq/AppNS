<mat-card class="neosoft-elevated-card" [@listFadeIn]>
  <mat-card-header class="card-header">
    <mat-card-title>Usuarios</mat-card-title>
    <mat-card-subtitle>Gestión de usuarios</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content class="card-content">
    <div class="toolbar">
      <button mat-raised-button color="primary" type="button" (click)="openCreate()">
        <mat-icon>add_circle</mat-icon>
        Añadir usuario
      </button>
    </div>

    <div class="table-area" [class.table-area--loading]="paged.list.isLoading()">
      @if (paged.list.isLoading()) {
        <div class="loading-overlay" aria-busy="true" aria-live="polite">
          <mat-spinner diameter="44"></mat-spinner>
        </div>
      }
      @if (paged.list.value(); as vm) {
        <app-maintainer-table
          [showToolbar]="true"
          toolbarMode="idName"
          [empty]="vm.items.length === 0"
          emptyMessage="No hay usuarios registrados."
          [length]="vm.totalCount"
          [pageIndex]="vm.pageIndex"
          [pageSize]="vm.pageSize"
          (pageChange)="onPage($event)"
          (filtersChange)="onFiltersChange($event)"
        >
          <table mat-table [dataSource]="vm.items" class="data-table">
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>ID</th>
              <td mat-cell *matCellDef="let row">{{ row.id }}</td>
            </ng-container>

            <ng-container matColumnDef="fullName">
              <th mat-header-cell *matHeaderCellDef>Nombre completo</th>
              <td mat-cell *matCellDef="let row">{{ row.fullName }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef>Correo</th>
              <td mat-cell *matCellDef="let row">{{ row.email }}</td>
            </ng-container>

            <ng-container matColumnDef="roleName">
              <th mat-header-cell *matHeaderCellDef>Rol</th>
              <td mat-cell *matCellDef="let row">{{ row.roleName }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="actions-col">Acciones</th>
              <td mat-cell *matCellDef="let row" class="actions-col">
                <button
                  mat-icon-button
                  type="button"
                  color="primary"
                  matTooltip="Editar"
                  (click)="edit(row)"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  type="button"
                  color="warn"
                  matTooltip="Eliminar"
                  (click)="confirmDelete(row)"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr
              mat-row
              *matRowDef="let row; columns: displayedColumns; trackBy: trackByUserId"
              [@rowAnimation]
            ></tr>
          </table>
        </app-maintainer-table>
      }
    </div>
  </mat-card-content>
</mat-card>
