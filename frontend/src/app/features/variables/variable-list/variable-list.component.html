<mat-card class="neosoft-elevated-card" [@listFadeIn]>
  <mat-card-header class="card-header">
    <mat-card-title>Variables</mat-card-title>
    <mat-card-subtitle>Parámetros del sistema</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content class="card-content">
    <div class="toolbar">
      <button mat-raised-button color="primary" type="button" (click)="openCreate()">
        <mat-icon>add_circle</mat-icon>
        Añadir variable
      </button>
    </div>

    @if (variables$ | async; as variables) {
      <div class="table-wrap">
        <table mat-table [dataSource]="variables" class="data-table">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let row">{{ row.id }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let row">{{ row.name }}</td>
          </ng-container>

          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef>Valor</th>
            <td mat-cell *matCellDef="let row">{{ row.value }}</td>
          </ng-container>

          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let row">{{ row.type }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-col">Acciones</th>
            <td mat-cell *matCellDef="let row" class="actions-col">
              <button
                mat-icon-button
                type="button"
                color="primary"
                matTooltip="Editar"
                (click)="edit(row)"
              >
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                type="button"
                color="warn"
                matTooltip="Eliminar"
                (click)="confirmDelete(row)"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns; trackBy: trackByVariableId"
            [@rowAnimation]
          ></tr>
        </table>

        @if (variables.length === 0) {
          <p class="empty">No hay variables registradas.</p>
        }
      </div>
    }
  </mat-card-content>
</mat-card>
